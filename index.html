<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mascot Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1b2a;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --mascot: #16f0e5;
            --mascot-border: rgb(18,201,201);
            --limb: #85c3e7;
        }

        body {
            background: var(--bg);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            font-family: 'Prompt', sans-serif;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(59,130,246,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(22,240,229,0.06) 0%, transparent 55%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(60px); pointer-events: none; opacity: 0.35;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .orb-1 { width:300px; height:300px; background:rgba(59,130,246,0.25); top:-80px; left:-80px; }
        .orb-2 { width:250px; height:250px; background:rgba(22,240,229,0.15); bottom:-60px; right:-60px; animation-delay:-4s; }

        @keyframes drift {
            from { transform: translate(0,0); }
            to   { transform: translate(30px,20px); }
        }

        @keyframes cardIn {
            from { opacity:0; transform:translateY(24px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        /* ── Wrapper ── */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
            position: relative;
        }

        /* ── Mascot head ── */
        .mascot {
            width: 110px; height: 110px;
            position: relative;
            z-index: 3;
            margin-bottom: -18px;
        }

        .head {
            background: var(--mascot);
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 5px solid var(--mascot-border);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(22,240,229,0.25), 0 4px 10px rgba(0,0,0,0.2);
        }

        .eyes {
            display: flex; gap: 18px;
            transition: transform 0.2s ease-out;
        }

        .eye {
            background: #0d1b2a;
            width: 13px; height: 13px; border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
        }

        .arms {
            position: absolute; top: 85px; left: 0;
            width: 100%; pointer-events: none;
        }

        .arm {
            background: var(--limb);
            width: 34px; height: 78px;
            border-radius: 20px; position: absolute;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: all 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
        }

        .arm.left  { left:-4px;  transform:rotate(-20deg); transform-origin:bottom center; }
        .arm.right { right:-4px; transform:rotate(20deg);  transform-origin:bottom center; }

        .mascot.cover-eyes .arm.left  { transform:translateY(-90px) rotate(35deg)  translateX(15px); }
        .mascot.cover-eyes .arm.right { transform:translateY(-90px) rotate(-35deg) translateX(-15px); }

        /* ── Card ── */
        .login-card {
            background: white;
            width: 360px;
            padding: 32px 32px 28px;
            border-radius: 28px;
            box-shadow:
                0 2px 0 rgba(255,255,255,0.05) inset,
                0 30px 60px rgba(0,0,0,0.45),
                0 8px 20px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top:0; left:10%; right:10%; height:1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            font-size: 22px; font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 28px;
            padding-top: 35px;
        }

        h2::after {
            content: '';
            display: block;
            width: 36px; height: 3px;
            background: var(--accent);
            border-radius: 4px;
            margin: 8px auto 0;
            opacity: 0.7;
        }

        .input-group { margin-bottom: 18px; }

        label {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--text-muted);
            margin-bottom: 8px; font-weight: 400;
        }

        input {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 14px; font-family: 'Prompt', sans-serif;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            background: var(--input-bg); color: var(--text-dark);
        }

        input::placeholder { color: #b0bec5; font-size: 13px; }

        input:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }

        .btn-login {
            width: 100%; padding: 15px;
            background: var(--accent); color: white;
            border: none; border-radius: 14px;
            font-size: 15px; font-weight: 600;
            font-family: 'Prompt', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(59,130,246,0.35);
            position: relative; overflow: hidden;
        }

        .btn-login::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
        }

        .btn-login:hover { background:var(--accent-dark); box-shadow:0 6px 20px rgba(59,130,246,0.45); }
        .btn-login:active { transform: scale(0.97); }

        .footer-hint {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: #b0bec5;
        }

        .footer-hint a {
            color: var(--accent);
            text-decoration: none; font-weight: 600;
        }
        .footer-hint a:hover { text-decoration: underline; }

        /* ── Legs ── */
        .legs {
            display: flex;
            gap: 36px;
            position: relative;
            z-index: 1;
            margin-top: -24px;
        }

        .leg-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .leg-unit.left  { transform: rotate(-5deg); transform-origin: top center; }
        .leg-unit.right { transform: rotate(5deg);  transform-origin: top center; }

        .leg {
            background: var(--limb);
            width: 30px; height: 56px;
            border-radius: 16px 16px 6px 6px;
            border: 2px solid rgba(255,255,255,0.55);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .foot {
            background: var(--limb);
            width: 42px; height: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.55);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-top: -4px;
        }

        .leg-unit.left  .foot { transform: translateX(-5px); }
        .leg-unit.right .foot { transform: translateX(5px);  }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="wrapper">

        <div class="mascot" id="mascot">
            <div class="head">
                <div class="eyes" id="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
            </div>
            <div class="arms">
                <div class="arm left"></div>
                <div class="arm right"></div>
            </div>
        </div>

        <form action="" class="login-card">
            <h2>เข้าสู่ระบบ</h2>

            <div class="input-group">
                <label for="username">ชื่อผู้ใช้</label>
                <input type="text" id="username" name="username"
                       placeholder="กรอกชื่อผู้ใช้ของคุณ..." autocomplete="off">
            </div>

            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" name="password"
                       placeholder="ความลับของคุณปลอดภัย!">
            </div>

            <button type="submit" class="btn-login">ล็อกอิน</button>

            <p class="footer-hint">ยังไม่มีบัญชี? <a href="Register-Robot.html">สมัครสมาชิก</a></p>
        </form>

        <div class="legs">
            <div class="leg-unit left">
                <div class="leg"></div>
                <div class="foot"></div>
            </div>
            <div class="leg-unit right">
                <div class="leg"></div>
                <div class="foot"></div>
            </div>
        </div>

    </div>

    <script>
        const mascot = document.getElementById('mascot');
        const eyes   = document.getElementById('eyes');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        passwordInput.addEventListener('focus', () => mascot.classList.add('cover-eyes'));
        passwordInput.addEventListener('blur',  () => mascot.classList.remove('cover-eyes'));

        usernameInput.addEventListener('focus', () => {
            eyes.style.transform = 'translateX(0px) translateY(30px)';
        });
        usernameInput.addEventListener('input', (e) => {
            const moveX = Math.min(e.target.value.length * 0.5, 15);
            eyes.style.transform = `translateX(${moveX}px) translateY(30px)`;
        });
        usernameInput.addEventListener('blur', () => {
            eyes.style.transform = 'translateX(0px) translateY(0px)';
        });
    </script>
</body>
</html>
