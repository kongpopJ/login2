<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #1e1e1e;
            --accent: #60a5fa;
            --accent-dark: #3b82f6;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --mascot: #93c5fd;
            --mascot-border: rgb(96,165,250);
            --limb: #bfdbfe;
        }

        body {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Prompt', sans-serif;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 15% 85%, rgba(255,255,255,0.03) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 15%, rgba(255,255,255,0.02) 0%, transparent 55%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
        }

        .orb {
            position: fixed; border-radius: 50%;
            filter: blur(60px); pointer-events: none; opacity: 0.35;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .orb-1 { width:400px; height:400px; background:rgba(255,255,255,0.025); top:-120px; left:-120px; }
        .orb-2 { width:300px; height:300px; background:rgba(255,255,255,0.018); bottom:-80px; right:-80px; animation-delay:-4s; }

        @keyframes drift {
            from { transform: translate(0,0); }
            to   { transform: translate(30px,20px); }
        }

        @keyframes cardIn {
            from { opacity:0; transform:translateY(24px) scale(0.97); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        /* ── Page body ── */
        .page-body {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 40px 16px;
        }

        /* ── Wrapper ── */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
            position: relative;
        }

        /* ── Mascot ── */
        .mascot {
            width: 110px; height: 110px;
            position: relative;
            z-index: 3;
            margin-bottom: -18px;
        }

        .head {
            background: var(--mascot);
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 5px solid var(--mascot-border);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(96,165,250,0.25), 0 4px 10px rgba(0,0,0,0.3);
        }

        .eyes {
            display: flex; gap: 18px;
            transition: transform 0.2s ease-out;
        }

        .eye {
            background: #1e1e1e;
            width: 13px; height: 13px; border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
        }

        .arms {
            position: absolute; top: 85px; left: 0;
            width: 100%; pointer-events: none;
        }

        .arm {
            background: var(--limb);
            width: 34px; height: 78px;
            border-radius: 20px; position: absolute;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: all 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
        }

        .arm.left  { left:-4px;  transform:rotate(-20deg); transform-origin:bottom center; }
        .arm.right { right:-4px; transform:rotate(20deg);  transform-origin:bottom center; }

        .mascot.cover-eyes .arm.left  { transform:translateY(-90px) rotate(35deg)  translateX(15px); }
        .mascot.cover-eyes .arm.right { transform:translateY(-90px) rotate(-35deg) translateX(-15px); }

        /* ── Card ── */
        .register-card {
            background: white;
            width: 440px;
            padding: 42px 42px 36px;
            border-radius: 28px;
            box-shadow:
                0 2px 0 rgba(255,255,255,0.05) inset,
                0 30px 60px rgba(0,0,0,0.45),
                0 8px 20px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .register-card::before {
            content: '';
            position: absolute;
            top:0; left:10%; right:10%; height:1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            font-size: 26px; font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 32px;
            padding-top: 40px;
        }

        /* 2-column row */
        .input-row {
            display: flex;
            gap: 14px;
            margin-bottom: 22px;
        }

        .input-row .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .input-group { margin-bottom: 22px; }

        label {
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; color: var(--text-muted);
            margin-bottom: 9px; font-weight: 400;
        }

        input {
            width: 100%; padding: 15px 18px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            font-size: 15px; font-family: 'Prompt', sans-serif;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            background: var(--input-bg); color: var(--text-dark);
        }

        input::placeholder { color: #b0bec5; font-size: 13px; }

        input:focus {
            border-color: #9ca3af;
            background: white;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.06);
        }

        input.error {
            border-color: #f87171;
            box-shadow: 0 0 0 4px rgba(248,113,113,0.08);
        }

        .hint {
            font-size: 11px;
            color: #f87171;
            margin-top: 5px;
            display: none;
        }
        .hint.show { display: block; }

        .btn-register {
            width: 100%; padding: 17px;
            background: var(--accent); color: white;
            border: none; border-radius: 14px;
            font-size: 16px; font-weight: 600;
            font-family: 'Prompt', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 14px rgba(59,130,246,0.35);
            position: relative; overflow: hidden;
        }

        .btn-register::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
        }

        .btn-register:hover { background:var(--accent-dark); box-shadow:0 6px 20px rgba(59,130,246,0.45); }
        .btn-register:active { transform: scale(0.97); }

        .footer-hint {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: #b0bec5;
        }

        .footer-hint a {
            color: var(--accent);
            text-decoration: none; font-weight: 600;
        }
        .footer-hint a:hover { text-decoration: underline; }

        /* ── Legs ── */
        .legs {
            display: flex;
            gap: 36px;
            position: relative;
            z-index: 1;
            margin-top: -24px;
        }

        .leg-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .leg-unit.left  { transform: rotate(-5deg); transform-origin: top center; }
        .leg-unit.right { transform: rotate(5deg);  transform-origin: top center; }

        .leg {
            background: var(--limb);
            width: 30px; height: 56px;
            border-radius: 16px 16px 6px 6px;
            border: 2px solid rgba(255,255,255,0.55);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .foot {
            background: var(--limb);
            width: 42px; height: 20px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.55);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-top: -4px;
        }

        .leg-unit.left  .foot { transform: translateX(-5px); }
        .leg-unit.right .foot { transform: translateX(5px);  }

        /* input row on mobile */
        @media (max-width: 500px) {
            .register-card { width: 360px; padding: 36px 24px 28px; }
            .input-row { flex-direction: column; gap: 0; margin-bottom: 0; }
            .input-row .input-group { margin-bottom: 22px; }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Navbar injected here -->
    <div id="navbar-placeholder"></div>

    <div class="page-body">
        <div class="wrapper">

            <div class="mascot" id="mascot">
                <div class="head">
                    <div class="eyes" id="eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                </div>
                <div class="arms">
                    <div class="arm left"></div>
                    <div class="arm right"></div>
                </div>
            </div>

            <form action="" class="register-card">
                <h2>สมัครสมาชิก</h2>

                <!-- Row 1: ชื่อเล่น + Gmail -->
                <div class="input-row">
                    <div class="input-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="ชื่อเล่นของคุณ" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="email">Gmail</label>
                        <input type="email" id="email" name="email" placeholder="example@gmail.com" autocomplete="off">
                    </div>
                </div>

                <!-- Row 2: เบอร์โทร + ชื่อผู้ใช้ -->
                <div class="input-row">
                    <div class="input-group">
                        <label for="phone">เบอร์โทร</label>
                        <input type="tel" id="phone" name="phone" placeholder="08x-xxx-xxxx" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label for="username">ชื่อผู้ใช้</label>
                        <input type="text" id="username" name="username" placeholder="username" autocomplete="off">
                    </div>
                </div>

                <!-- รหัสผ่าน -->
                <div class="input-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" name="password" placeholder="ความลับของคุณปลอดภัย!">
                </div>

                <!-- ยืนยันรหัสผ่าน -->
                <div class="input-group">
                    <label for="confirm">ยืนยันรหัสผ่าน</label>
                    <input type="password" id="confirm" name="confirm" placeholder="กรอกรหัสผ่านอีกครั้ง">
                    <p class="hint" id="match-hint">รหัสผ่านไม่ตรงกัน</p>
                </div>

                <button type="submit" class="btn-register">สมัครสมาชิก</button>

                <p class="footer-hint">มีบัญชีอยู่แล้ว? <a href="index.html">เข้าสู่ระบบ</a></p>
            </form>

            <div class="legs">
                <div class="leg-unit left">
                    <div class="leg"></div>
                    <div class="foot"></div>
                </div>
                <div class="leg-unit right">
                    <div class="leg"></div>
                    <div class="foot"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer injected here -->
    <div id="footer-placeholder"></div>

    <script>
        /* Load navbar */
        fetch('navbar.html')
            .then(res => res.text())
            .then(html => {
                document.getElementById('navbar-placeholder').innerHTML = html;
                initNavbar();
            })
            .catch(() => {
                document.getElementById('navbar-placeholder').innerHTML = `
                    <nav class="navbar">
                        <a href="#" class="navbar-brand">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCdvlt_TxlYQcS6NAuUII9T8McHsWFr_1EgA&s" alt="Logo">
                        </a>
                        <ul class="navbar-links" id="navLinks">
                            <li><a href="index.html">Home</a></li>
                            <li><a href="about.html">About</a></li>
                            <li><a href="product.html">Product</a></li>
                            <li><a href="contact.html">Contact</a></li>
                            <li class="cta-item"><a href="login.html" class="navbar-cta">เข้าสู่ระบบ</a></li>
                        </ul>
                        <div class="navbar-right">
                            <a href="login.html" class="mobile-cta">เข้าสู่ระบบ</a>
                            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </nav>`;
                initNavbar();
            });

        function initNavbar() {
            document.querySelectorAll('.navbar-links a:not(.navbar-cta)').forEach(link => {
                link.addEventListener('click', function() {
                    document.querySelectorAll('.navbar-links a').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        function toggleMenu() {
            const nav = document.getElementById('navLinks');
            if (nav) nav.classList.toggle('open');
        }

        /* Load footer */
        fetch('footer.html')
            .then(res => res.text())
            .then(html => { document.getElementById('footer-placeholder').innerHTML = html; })
            .catch(() => {});

        /* Mascot interactions */
        const mascot   = document.getElementById('mascot');
        const eyes     = document.getElementById('eyes');
        const password = document.getElementById('password');
        const confirm  = document.getElementById('confirm');
        const hint     = document.getElementById('match-hint');

        const textInputs = ['nickname', 'email', 'phone', 'username'];
        textInputs.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('focus', () => {
                eyes.style.transform = 'translateX(0px) translateY(30px)';
            });
            el.addEventListener('input', (e) => {
                const moveX = Math.min(e.target.value.length * 0.5, 15);
                eyes.style.transform = `translateX(${moveX}px) translateY(30px)`;
            });
            el.addEventListener('blur', () => {
                eyes.style.transform = 'translateX(0px) translateY(0px)';
            });
        });

        [password, confirm].forEach(el => {
            el.addEventListener('focus', () => mascot.classList.add('cover-eyes'));
            el.addEventListener('blur',  () => mascot.classList.remove('cover-eyes'));
        });

        confirm.addEventListener('input', () => {
            if (confirm.value && confirm.value !== password.value) {
                confirm.classList.add('error');
                hint.classList.add('show');
            } else {
                confirm.classList.remove('error');
                hint.classList.remove('show');
            }
        });
    </script>
</body>
</html>
